# Deploy container image via the deployment gateway.
# Build + push to GHCR (optional), then call the container-deploy action.
#
# Required repo Variable: DEPLOY_GATEWAY_URL (provided by platform)
# Required Secrets: DEPLOY_ORG_ID, DEPLOY_IAM_USERNAME, DEPLOY_IAM_PASSWORD,
#                   DEPLOY_SERVICE_NAME, DEPLOY_CONTAINER_NAME
# Optional Secrets: DEPLOY_REGISTRY_USERNAME, DEPLOY_REGISTRY_PASSWORD (for tower/private registries)

name: Deploy via API Gateway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment label
        required: false
        default: dev
        type: string
      build_image:
        description: Build and push image to ghcr.io before deploy
        required: false
        default: true
        type: boolean
      image_uri:
        description: Full image URI when build_image is false
        required: false
        default: ''
        type: string
      registry_profile:
        description: auto (ghcr), tower, external-private
        required: false
        default: auto
        type: choice
        options:
          - auto
          - tower
          - external-private
      tower_registry_name:
        description: For profile tower
        required: false
        default: ''
        type: string
      rollout_timeout_seconds:
        required: false
        default: '600'
        type: string

concurrency:
  group: sample-workflow-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          set -euo pipefail
          missing=0
          for v in DEPLOY_GATEWAY_URL DEPLOY_ORG_ID DEPLOY_IAM_USERNAME DEPLOY_IAM_PASSWORD DEPLOY_SERVICE_NAME DEPLOY_CONTAINER_NAME; do
            val=""
            case "$v" in
              DEPLOY_GATEWAY_URL) val="${{ vars.DEPLOY_GATEWAY_URL }}" ;;
              DEPLOY_ORG_ID) val="${{ secrets.DEPLOY_ORG_ID }}" ;;
              DEPLOY_IAM_USERNAME) val="${{ secrets.DEPLOY_IAM_USERNAME }}" ;;
              DEPLOY_IAM_PASSWORD) val="${{ secrets.DEPLOY_IAM_PASSWORD }}" ;;
              DEPLOY_SERVICE_NAME) val="${{ secrets.DEPLOY_SERVICE_NAME }}" ;;
              DEPLOY_CONTAINER_NAME) val="${{ secrets.DEPLOY_CONTAINER_NAME }}" ;;
            esac
            if [ -z "$val" ]; then
              echo "::error::Missing required $v (set vars/secrets in this repo)"
              missing=1
            fi
          done
          if [ "${{ inputs.build_image }}" != "true" ] && [ -z "${{ inputs.image_uri }}" ]; then
            echo "::error::When build_image is false, input image_uri is required"
            missing=1
          fi
          exit "$missing"

      - name: Set up Docker Buildx
        if: inputs.build_image == true || github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: inputs.build_image == true || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: inputs.build_image == true || github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Resolve image URI
        id: image
        run: |
          if [ "${{ inputs.build_image }}" == "false" ] && [ -n "${{ inputs.image_uri }}" ]; then
            echo "uri=${{ inputs.image_uri }}" >> "$GITHUB_OUTPUT"
          else
            echo "uri=ghcr.io/${{ github.repository }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy container
        uses: ./workflow-service
        with:
          gateway-url: ${{ vars.DEPLOY_GATEWAY_URL }}
          org-id: ${{ secrets.DEPLOY_ORG_ID }}
          iam-username: ${{ secrets.DEPLOY_IAM_USERNAME }}
          iam-password: ${{ secrets.DEPLOY_IAM_PASSWORD }}
          service-name: ${{ secrets.DEPLOY_SERVICE_NAME }}
          container-name: ${{ secrets.DEPLOY_CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}
          environment: ${{ inputs.environment || 'dev' }}
          registry-mode: ${{ inputs.registry_profile || 'auto' }}
          registry-host: ghcr.io
          tower-registry-name: ${{ inputs.tower_registry_name }}
          registry-username: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          registry-password: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
          rollout-timeout-seconds: ${{ inputs.rollout_timeout_seconds || '600' }}
