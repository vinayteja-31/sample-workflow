# Deploy container image to Tower Cloud via API gateway.
# Build + push to GHCR, then update container instance.
#
# Required repo Variable: DEPLOY_GATEWAY_URL (e.g. https://api.dev.tower.cloud)
# Required Secrets: DEPLOY_ORG_ID, DEPLOY_IAM_USERNAME, DEPLOY_IAM_PASSWORD,
#                   DEPLOY_CONTAINER_NAME, DEPLOY_SERVICE_NAME
# Optional Secrets: DEPLOY_REGISTRY_USERNAME, DEPLOY_REGISTRY_PASSWORD

name: Deploy to Tower Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_image:
        description: Build and push image to ghcr.io before deploy
        required: false
        default: true
        type: boolean
      image_uri:
        description: Full image URI when build_image is false
        required: false
        default: ''
        type: string
      rollout_timeout_seconds:
        required: false
        default: '600'
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: inputs.build_image != false
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: inputs.build_image != false
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: inputs.build_image != false
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Resolve image URI
        id: image
        run: |
          if [ "${{ inputs.build_image }}" = "false" ] && [ -n "${{ inputs.image_uri }}" ]; then
            echo "uri=${{ inputs.image_uri }}" >> "$GITHUB_OUTPUT"
          else
            echo "uri=ghcr.io/${{ github.repository }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Tower Cloud
        uses: vinayteja-31/worflow-service@main
        with:
          tower-api-url: ${{ vars.DEPLOY_GATEWAY_URL }}
          tower-user: ${{ secrets.DEPLOY_IAM_USERNAME }}
          tower-password: ${{ secrets.DEPLOY_IAM_PASSWORD }}
          organization-id: ${{ secrets.DEPLOY_ORG_ID }}
          container-name: ${{ secrets.DEPLOY_CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}
          registry-username: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          registry-password: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
          rollout-timeout-seconds: ${{ inputs.rollout_timeout_seconds || '600' }}
