# Deploy container image to Tower Cloud via API gateway.
# Build + push to Tower Container Registry, then update container instance.
#
# Required repo Variable: DEPLOY_GATEWAY_URL (e.g. https://api.dev.tower.cloud)
# Required Secrets: DEPLOY_ORG_ID, DEPLOY_IAM_USERNAME, DEPLOY_IAM_PASSWORD,
#                   DEPLOY_CONTAINER_NAME, DEPLOY_REGISTRY_URL,
#                   DEPLOY_REGISTRY_USERNAME, DEPLOY_REGISTRY_PASSWORD

name: Deploy to Tower Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollout_timeout_seconds:
        required: false
        default: '600'
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      # Image: {registry_url}/{repository}:{sha}
      # DEPLOY_REGISTRY_REPO should match the repository path in your Tower registry (e.g. my-org/my-app)
      IMAGE_TAG: ${{ secrets.DEPLOY_REGISTRY_URL }}/${{ secrets.DEPLOY_REGISTRY_REPO }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tower Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DEPLOY_REGISTRY_URL }}
          username: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          password: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_TAG }}

      - name: Deploy to Tower Cloud
        uses: vinayteja-31/worflow-service@main
        with:
          tower-api-url: ${{ vars.DEPLOY_GATEWAY_URL }}
          tower-user: ${{ secrets.DEPLOY_IAM_USERNAME }}
          tower-password: ${{ secrets.DEPLOY_IAM_PASSWORD }}
          organization-id: ${{ secrets.DEPLOY_ORG_ID }}
          container-name: ${{ secrets.DEPLOY_CONTAINER_NAME }}
          image: ${{ env.IMAGE_TAG }}
          registry-username: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          registry-password: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
          rollout-timeout-seconds: ${{ inputs.rollout_timeout_seconds || '600' }}
